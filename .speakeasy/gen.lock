e principal balance, without compounding. |\n| Solvency | When banks have enough money to cover potential losses. Banks are expected to maintain a sufficient level of capital to remain solvent and avoid failure. The FDIC and other federal regulators work with banks to maintain standards for solvency. |\n", "snippetType": "chunks", "normalizedScore": 0.5181809022102427, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1072", "name": "Using Online Banking"}]}]}, {"id": "PROD-2575", "name": "Glossary of Terms", "docType": "HTML", "source": "eGain Article", "snippet": "|  |  |\n| --- | --- |\n| Simple interest | Interest computed only on the principal balance, without compounding. |\n| Solvency | When banks have enough money to cover potential losses. Banks are expected to maintain a sufficient level of capital to remain solvent and avoid failure. The FDIC and other federal regulators work with banks to maintain standards for solvency. |\n| Surcharge | An amount charged by the owner of an ATM. This generally applies to out-of-network ATMs. |\n| T |  |\n| Term | The time to the maturity of a loan or deposit. For example, a CD can have a term from 3 to 60 months. |\n| Total value | The current worth of an account, including funds on hold or pending approval. |\n| V |  |\n| Variable rate | An interest rate that may fluctuate during the term of a loan, line of credit or deposit account. The new rate is sometimes determined by The Wall Street Journal prime rate. See also “adjustable rate” and “indexed rate.” |\n| W |  |\n| Wire transfer | An electronic payment service for transferring funds by wire. Wire transfers are guaranteed funds for the recipient, meaning the payment cannot be revoked by the sender after the transfer. A wire transfer typically involves paying a fee, depending on whether the transfer is incoming or outgoing and domestic or international. |\n", "snippetType": "chunks", "normalizedScore": 0.4720211674363051, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1072", "name": "Using Online Banking"}]}]}, {"id": "PROD-2575", "name": "Glossary of Terms", "docType": "HTML", "source": "eGain Article", "snippet": "|  |  |\n| --- | --- |\n| Simple interest | Interest computed only on the principal balance, without compounding. |\n| Solvency | When banks have enough money to cover potential losses. Banks are expected to maintain a sufficient level of capital to remain solvent and avoid failure. The FDIC and other federal regulators work with banks to maintain standards for solvency. |\n| Surcharge | An amount charged by the owner of an ATM. This generally applies to out-of-network ATMs. |\n| T |  |\n| Term | The time to the maturity of a loan or deposit. For example, a CD can have a term from 3 to 60 months. |\n| Total value | The current worth of an account, including funds on hold or pending approval. |\n| V |  |\n| Variable rate | An interest rate that may fluctuate during the term of a loan, line of credit or deposit account. The new rate is sometimes determined by The Wall Street Journal prime rate. See also “adjustable rate” and “indexed rate.” |\n| W |  |\n| Wire transfer | An electronic payment service for transferring funds by wire. Wire transfers are guaranteed funds for the recipient, meaning the payment cannot be revoked by the sender after the transfer. A wire transfer typically involves paying a fee, depending on whether the transfer is incoming or outgoing and domestic or international. |\n", "snippetType": "chunks", "normalizedScore": 0.4720211674363051, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1072", "name": "Using Online Banking"}]}]}, {"id": "PROD-2615", "name": "Talk to a Banker - Home Loans", "docType": "HTML", "source": "eGain Article", "snippet": "Whether you have questions about buying or refinancing a home, applying for or paying off a mortgage or home equity line of credit, or how the home lending process works in general, we've got answers.\n\nMake an appointment with a \\[Sample Company Name\\] Bank today by visiting \\[Sample Website Address\\] or by calling to talk to a Banker: \\[Sample Customer Service Phone Number\\] \\[Sample Text Based Phone Number\\]. Outside the U.S., call \\[Sample International Number\\].", "snippetType": "chunks", "normalizedScore": 0.45921719114211856, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1070", "name": "Loans"}]}]}, {"id": "PROD-2997", "name": "Discriminitatory Lending Practices", "docType": "HTML", "source": "eGain Article", "snippet": "# What are some examples of discriminatory lending practices?\n\nA lender commits discriminatory lending practices when he or she acts in one or more of the following manners:\n\n- Refuses to make a mortgage loan on the basis of race, color, national origin, religion, sex, familial status, or disability; 7 8\n\n- Refuses to provide information regarding mortgage loans on the basis of race, color, national origin, religion, sex, familial status, or disability\n\n- Imposes different terms or conditions on a mortgage loan, such as different interest rates, points, or fees on the basis of race, color, national origin, religion, sex, familial status, or disability\n\n- Discriminates in appraising property on the basis of race, color, national origin, religion, sex, familial status, or disability\n\n- Steers an applicant toward a bad mortgage loan product on the basis of race, color, national origin, religion, sex, familial status, or disability\n\n- Provides inferior servicing of a mortgage loan on the basis of race, color, national origin, religion, sex, familial status, or disability\n\n# Can my bank officer commit lending discrimination?\n\nYes. Any lender, real estate and mortgage broker, appraiser, loan servicer, and title company can commit lending discrimination in any phase of the mortgage loan process. You should report any person, company, or entity attempting to violate your fair lending rights immediately to HUD or a state or local fair housing agency. (Refer to Red Tab, Reporting Lending Discrimination) \n\n# When does lending discrimination occur?\n\nWhether you are purchasing or refinancing a home, lending discrimination can occur at any stage of the lending process. For example, if a lender refuses to make a mortgage loan because of your race or ethnicity, or if a lender charges excessive fees to refinance your current mortgage loan based on your race or ethnicity, the lender is in violation of the federal Fair Housing Act. \n\n# What are some of the warning signs of lending discrimination?\n\nThe signs of lending discrimination may be blatant or subtle. They can occur in the marketing of mortgage loan products, mortgage loan transactions, terms and conditions of the loan, in the appraisal of a home, and in loan servicing.\n\nIn the marketing of mortgage loan products, be aware of:\n\n- Aggressive solicitations of adverse terms of credit to targeted minority neighborhoods, racial or ethnic groups, and communities\n\n- Racial steering to high cost lenders.\n\n- In the mortgage loan transaction, be aware of:\n\n- Requiring that women, but not men, provide a co-signer for a loan.\n\nIn the terms and conditions of the mortgage loan that are more often imposed upon borrowers of a certain race or nationality or upon women, be aware of: \n\n- Unnecessary closing costs\n\n- Inflated appraisal costs\n\n- Inflated broker or lender fees\n\n- Unnecessary recording fees\n\n- Excessive prepayment penalties\n\n- Changing mortgage loan terms at closing without the consent of the borrower.\n\nIn the appraisal of a home, be aware of properties that are undervalued because of the race or nationality of either the borrower or the other residents in the surrounding neighborhood.\n\nIn the servicing of the mortgage loan, be aware of:\n\n- Collection or foreclosure practices applied more harshly because of the race or nationality of either the borrower or the other residents in the surrounding neighborhood.", "snippetType": "chunks", "normalizedScore": 0.2830405804592237, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1080", "name": "Banking Regulations"}]}]}, {"id": "PROD-2733", "name": "What is the Difference Between Prequalification and Preapproval?", "docType": "HTML", "source": "eGain Article", "snippet": "**Prequalification**\n\nThe Banker collects estimates of your income and liabilities to determine what mortgage products may be available to you and what you can afford to borrow. Our Mortgage Bankers can prequalify you by phone, in some cases. It normally takes 15 to 20 minutes and the applicant will receive a prequalification letter.\n\n**Preapproval**\n\nThis is a more thorough review of your creditworthiness. We verify not only your credit, but also your income, assets and liabilities. Further, you will need to submit documentation such as proof of income, assets and debt records. The process can take 20 minutes if you come prepared, or in some cases up to 2 business days.", "snippetType": "chunks", "normalizedScore": 0.18605361669534096, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1070", "name": "Loans"}]}]}, {"id": "PROD-2583", "name": "Using Zelle", "docType": "HTML", "source": "eGain Article", "snippet": "# Using Zelle\n\nWith Zelle you can send money to friends, family and almost anyone you know and trust, no matter where they bank in the U.S.  \n\n# Why Use Zelle\n\nIt’s a fast and secure transfer where money is deposited directly into your recipient’s bank account typically within minutes. You can also request money from others using Zelle. \n\nYour recipient gets a request to send you money and you’ll receive the money within minutes after it’s sent.\n\n# Split Feature\n\nZelle comes with a handy Split feature that lets you easily divide expenses, making things like splitting dinner checks, settling up with roommates or paying your share of a group gift simple and easy.", "snippetType": "chunks", "normalizedScore": 0.18394147762849983, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1001", "name": "Online Access"}, {"id": "PROD-1084", "name": "Zelle"}]}]}, {"id": "PROD-2554", "name": "Banking Regulations", "docType": "HTML", "source": "eGain Article", "snippet": "U.S. banking regulation addresses privacy, disclosure, fraud prevention, anti-money laundering, anti-terrorism, anti-usury lending, and the promotion of lending to lower-income populations**.** Some individual cities also enact their own financial regulation laws (for example, defining what constitutes usurious lending).", "snippetType": "chunks", "normalizedScore": 0.16558712775547277, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1080", "name": "Banking Regulations"}]}]}, {"id": "PROD-2577", "name": "Short Description of Mobile Deposit", "docType": "HTML", "source": "eGain Article", "snippet": "\\[Sample Company Name\\] deposit is secure and convenient. Deposit checks directly into your account using your mobile device.\n\n# How does mobile deposit work?\n\nMobile check deposit allows you to save time by depositing your checks remotely, no matter where you are or what time of day it is. Instead of making a run to the bank, you can simply snap a picture of the front and back of the check on your smartphone and deposit it using the bank's mobile app.", "snippetType": "chunks", "normalizedScore": 0.13648458089091964, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1066", "name": "Checking and Savings Accounts"}]}]}, {"id": "PROD-2568", "name": "Office of the Comptroller of the Currency (OCC) Banking Regulations", "docType": "HTML", "source": "eGain Article", "snippet": "The OCC is the primary regulator of banks chartered under the National Bank Act (12 USC 1 et seq.) and federal savings associations chartered under the Home Owners' Loan Act of 1933 (12 USC 1461 et seq.). The OCC's regulations, derived from these acts, are in title 12 of the Code of Federal Regulations, \"Banks and Banking\" (12 CFR 1–199).\n\nThe OCC may take enforcement actions for violations of laws, rules or regulations, final orders or conditions imposed in writing; unsafe or unsound practices; and breach of fiduciary duty by institution-affiliated parties.\n\n- [OCC Bulletins](https://www.occ.treas.gov/news-issuances/bulletins/index.html)\n\n- [OCC Comptroller’s Handbook](https://www.occ.treas.gov/publications/publications-by-type/comptrollers-handbook/index-comptrollers-handbook.html)\n\n- [Part 2 - Sales of Credit Life Insurance](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr2_main_02.tpl)\n\n- [Part 14 - Consumer Protection in Sales of Insurance](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr14_main_02.tpl)\n\n- [Part 21 - Minimum Security Devices and Procedures, SAR & BSA Compliance Program](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr21_main_02.tpl)\n\n- [Part 22 - Loans in Areas having Special Flood Hazards](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr22_main_02.tpl)\n\n- [Part 25 - Community Reinvestment Act (CRA)](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr25_main_02.tpl)\n\n- [Part 32 - Lending Limits](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr32_main_02.tpl)\n\n- [Part 34 - Real Estate Lending and Appraisals](https://www.ecfr.gov/cgi-bin/text-idx?SID=224c14efa9422c576004740f04473ca0&tpl=/ecfrbrowse/Title12/12cfr34_main_02.tpl)", "snippetType": "chunks", "normalizedScore": 0.13457933361485352, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1080", "name": "Banking Regulations"}]}]}, {"id": "PROD-2766", "name": "How Do I Apply for a Credit Card?", "docType": "HTML", "source": "eGain Article", "snippet": "You can apply online for our <c/cName#1> and <c/cName#2> by going to _**Compare Credit Cards**_ and clicking **\"Apply Now\"** next to the card you want. Alternatively, you can apply by calling \\[Sample Customer Service Phone Number\\] \\[Sample Credit Card Extension\\] /  \\[Sample Text Based Phone Number\\], Mon–Fri 7 am–5 pm PT.  To apply for the Secured Credit Card, visit your local branch.", "snippetType": "chunks", "normalizedScore": 0.1103068233378137, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1066", "name": "Checking and Savings Accounts"}, {"id": "PROD-1068", "name": "Credit Cards"}]}]}], "channel": {"type": "custom", "name": "Eight Bank Website"}, "sessionId": "6154589f-b43f-4471-b2c7-92c6c888a791", "eventId": "615458"}
