"HTML", "source": "eGain Article", "snippet": "|  |  |\n| --- | --- |\n| Minimum balance | The amount your average balance in a deposit account must stay above to avoid fees. |\n| Money market account | A high-yield savings account that’s FDIC-insured up to $250,000. In contrast to a CD, with a money market account, you can still have regular access to your funds. |\n| Mortgage loan | A loan used to purchase or refinance a home or real property, with payments usually spread over 10 to 30 years. It’s secured by real estate, such as the borrower's primary residence. |\n| Non-sufficient funds (NSF) | An account balance too low to cover a check presented for payment. |\n| Online bank | Online banks, also called digital or internet banks, operate primarily via the internet. You can manage your accounts at an online bank from a computer or mobile device from anywhere at any time. |\n| Overdraft | Something that occurs when you make a purchase with your debit card or write a check for an amount that exceeds your checking account’s available balance. Many bank accounts offer overdraft protection to help avoid overdraft fees. Some banks don’t charge overdraft fees at all. |\n| Overdraft protection | An arrangement made between you and your bank that allows you to withdraw more than the balance in your account without incurring any penalties. |\n| P |  |\n| Payee | A person or business to whom a check is written. |\n| Periodic rate | The interest rate over a specific period of time. A monthly periodic rate is the cost of credit per month. A daily periodic rate is the cost of credit per day, and so forth. |\n| Personal identification number (PIN) | A number issued with your debit or credit card so you can withdraw money from ATMs. To help prevent fraud, keep your PIN secret. A PIN should be memorized, never written down or disclosed to anyone else. |\n| Prime Rate | The interest rate that banks use to establish the indexed rate for certain loan products. The prime rate is published in The Wall Street Journal. |\n| Routing number | The first nine numbers that appear at the bottom of a check to identify the financial institution responsible for holding the account. Learn how to find a routing number on a check. |\n| S |  |\n| Savings account | An interest-bearing deposit account used for storing money, like an emergency fund. A savings account may have been your first experience with the banking industry. You have a number of options for where to stow your savings safely, both at banks and credit unions. |\n| Scheduled transfer | Moving money from one account to another on a regular recurring basis, often monthly. |\n| Secure Socket Layer (SSL) | A type of technology that protects your credit card and personal details when you shop or bank online. |\n| Service charge | A charge for a service or a penalty for not meeting certain requirements, such as insufficient funds in a checking account. |\n| Simple interest | Interest computed only on the principal balance, without compounding. |\n| Solvency | When banks have enough money to cover potential losses. Banks are expected to maintain a sufficient level of capital to remain solvent and avoid failure. The FDIC and other federal regulators work with banks to maintain standards for solvency. |\n", "snippetType": "chunks", "normalizedScore": 0.5201590697528378, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1072", "name": "Using Online Banking"}]}]}, {"id": "PROD-2575", "name": "Glossary of Terms", "docType": "HTML", "source": "eGain Article", "snippet": "|  |  |\n| --- | --- |\n| Minimum balance | The amount your average balance in a deposit account must stay above to avoid fees. |\n| Money market account | A high-yield savings account that’s FDIC-insured up to $250,000. In contrast to a CD, with a money market account, you can still have regular access to your funds. |\n| Mortgage loan | A loan used to purchase or refinance a home or real property, with payments usually spread over 10 to 30 years. It’s secured by real estate, such as the borrower's primary residence. |\n| Non-sufficient funds (NSF) | An account balance too low to cover a check presented for payment. |\n| Online bank | Online banks, also called digital or internet banks, operate primarily via the internet. You can manage your accounts at an online bank from a computer or mobile device from anywhere at any time. |\n| Overdraft | Something that occurs when you make a purchase with your debit card or write a check for an amount that exceeds your checking account’s available balance. Many bank accounts offer overdraft protection to help avoid overdraft fees. Some banks don’t charge overdraft fees at all. |\n| Overdraft protection | An arrangement made between you and your bank that allows you to withdraw more than the balance in your account without incurring any penalties. |\n| P |  |\n| Payee | A person or business to whom a check is written. |\n| Periodic rate | The interest rate over a specific period of time. A monthly periodic rate is the cost of credit per month. A daily periodic rate is the cost of credit per day, and so forth. |\n| Personal identification number (PIN) | A number issued with your debit or credit card so you can withdraw money from ATMs. To help prevent fraud, keep your PIN secret. A PIN should be memorized, never written down or disclosed to anyone else. |\n| Prime Rate | The interest rate that banks use to establish the indexed rate for certain loan products. The prime rate is published in The Wall Street Journal. |\n| Routing number | The first nine numbers that appear at the bottom of a check to identify the financial institution responsible for holding the account. Learn how to find a routing number on a check. |\n| S |  |\n| Savings account | An interest-bearing deposit account used for storing money, like an emergency fund. A savings account may have been your first experience with the banking industry. You have a number of options for where to stow your savings safely, both at banks and credit unions. |\n| Scheduled transfer | Moving money from one account to another on a regular recurring basis, often monthly. |\n| Secure Socket Layer (SSL) | A type of technology that protects your credit card and personal details when you shop or bank online. |\n| Service charge | A charge for a service or a penalty for not meeting certain requirements, such as insufficient funds in a checking account. |\n| Simple interest | Interest computed only on the principal balance, without compounding. |\n| Solvency | When banks have enough money to cover potential losses. Banks are expected to maintain a sufficient level of capital to remain solvent and avoid failure. The FDIC and other federal regulators work with banks to maintain standards for solvency. |\n", "snippetType": "chunks", "normalizedScore": 0.5181809022102427, "topicBreadcrumb": [{"topicSummary": [{"id": "PROD-1072", "name": "Using Online Banking"}]}]}, {"id": "PROD-2575", "name": "Glossary of Terms", "docType": "HTML", "source": "eGain Article", "snippet": "|  |  |\n| --- | --- |\n| Minimum balance | The amount your average balance in a deposit account must stay above to avoid fees. |\n| Money market account | A high-yield savings account that’s FDIC-insured up to $250,000. In contrast to a CD, with a money market account, you can still have regular access to your funds. |\n| Mortgage loan | A loan used to purchase or refinance a home or real property, with payments usually spread over 10 to 30 years. It’s secured by real estate, such as the borrower's primary residence. |\n| Non-sufficient funds (NSF) | An account balance too low to cover a check presented for payment. |\n| Online bank | Online banks, also called digital or internet banks, operate primarily via the internet. You can manage your accounts at an online bank from a computer or mobile device from anywhere at any time. |\n| Overdraft | Something that occurs when you make a purchase with your debit card or write a